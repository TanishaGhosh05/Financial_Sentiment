<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Financial Sentiment Analyzer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Financial Sentiment Analyzer</h1>
        <form method="POST">
            <textarea name="text" placeholder="Enter financial news or statement..." required></textarea><br>
            <button type="submit">Analyze</button>
        </form>
        {% if result %}
        <div class="result">
            <h2>Result:</h2>
            <p>{{ result }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
